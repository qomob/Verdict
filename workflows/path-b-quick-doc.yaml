name: verdict-path-b-quick-doc
version: "1.0"
description: 路径B — 快速文书生成。跳过攻防推演，直接生成法律文书草稿。

input:
  type: object
  required:
    - case_background
    - document_type
  properties:
    case_background:
      type: string
      description: 案件背景信息
    document_type:
      type: string
      enum: [complaint, defense_statement, agency_opinion, cross_examination_opinion]
      description: 文书类型（起诉状/答辩状/代理词/质证意见）
    jurisdiction:
      type: string
      enum: [cn, us, jp, kr, eu, sea, me]
      default: cn
    trial_stage:
      type: string
      enum: [arbitration, first_instance, second_instance, retrial]

steps:
  - id: verify_statutes
    agent: reinforcement-advisor
    description: 轻量法条验证 — 对文书中将引用的法条执行 MCP fact_check，防止路径B完全跳过法律验证
    required_tools:
      - mcp_Jina_AI.fact_check
    fallback_if_tools_unavailable:
      action: continue_with_unverified_tag
      note: "MCP 不可用，文书中的法条引用全部标注 unverified，在 disclaimer 中强化提示"
    input:
      case_background: "{{input.case_background}}"
      jurisdiction: "{{input.jurisdiction}}"
      document_type: "{{input.document_type}}"
    output: verified_statutes
    scope:
      do: [extract_statute_references_from_case, fact_check_each_statute]
      dont: [full_legal_research, evidence_analysis, attack_defense]

  - id: generate_document
    agent: reinforcement-advisor
    description: 基于验证后的法条生成文书草稿
    load_references:
      - "references/{{input.jurisdiction}}/case-*.md"
    input:
      case_background: "{{input.case_background}}"
      document_type: "{{input.document_type}}"
      jurisdiction: "{{input.jurisdiction}}"
      trial_stage: "{{input.trial_stage}}"
      verified_statutes: "{{verify_statutes.output.verified_statutes}}"
    output: legal_document
    checkpoint:
      format: markdown
      confirm: true
